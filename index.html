<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATOS Bridge Coprocessor</title>
    <script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: #fff; }
        .tabs { display: flex; background: #2a2a2a; padding: 8px 16px 0; gap: 4px; }
        .tab {
            padding: 8px 20px; cursor: pointer; border-radius: 6px 6px 0 0;
            background: #3a3a3a; border: none; color: #aaa; font-size: 14px;
        }
        .tab.active { background: #1a1a1a; color: #fff; }
        .view { display: none; height: calc(100vh - 41px); }
        .view.active { display: block; }
        kicanvas-embed { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="show('sch', this)">Schematic</button>
        <button class="tab" onclick="show('pcb', this)">PCB Layout</button>
    </div>
    <div id="sch" class="view active">
        <kicanvas-embed src="./ATOS-Bridge-Comms-core.kicad_sch" controls="full"></kicanvas-embed>
    </div>
    <div id="pcb" class="view">
        <kicanvas-embed src="./ATOS-Bridge-Comms-core.kicad_pcb" controls="full"></kicanvas-embed>
    </div>
    <script>
        function show(id, tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tab.classList.add('active');
        }
    </script>
</body>
</html>
